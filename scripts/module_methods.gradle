apply from: "$project.rootDir/scripts/external_dependencies.gradle"
apply from: "$project.rootDir/scripts/android_config.gradle"

ext {

    applyViewBinding = { module ->
        module.configure(module) {
            android {
                buildFeatures {
                    viewBinding true
                }
            }
        }
    }

    applyDagger = { module ->
        module.dependencies {
            implementation daggerDependency
            kapt daggerCompiler
        }
    }
}